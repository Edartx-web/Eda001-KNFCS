# Render Blueprint — KNFC Backend
# Database: Supabase (external, free forever)
# Redis:    Upstash  (external, free forever)
#
# First deploy:
#   1. Push this file to GitHub
#   2. Render Dashboard → New → Blueprint → connect repo
#   3. Fill in the secret env vars flagged with sync: false
#   4. Click Apply

services:
  # ── Django ASGI Web Service ───────────────────────────────────────────────────
  - type: web
    name: knfc-backend
    runtime: python
    plan: free
    region: singapore
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production

      - key: SECRET_KEY
        generateValue: true

      # Supabase PostgreSQL — set manually in Render dashboard
      - key: DATABASE_URL
        sync: false

      # Upstash Redis — set manually in Render dashboard
      - key: REDIS_URL
        sync: false

      - key: DB_SSL_REQUIRE
        value: "True"

      - key: BACKEND_URL
        value: https://knfc-backend.onrender.com

      - key: ALLOWED_HOSTS
        value: knfc-backend.onrender.com,api.knfcs.com,knfcs.com,www.knfcs.com

      - key: CORS_ALLOWED_ORIGINS
        value: https://knfcs.com,https://www.knfcs.com

      - key: FRONTEND_URL
        value: https://knfcs.com

      - key: WHATSAPP_SERVICE_URL
        value: https://knfc-whatsapp.onrender.com

      - key: WHATSAPP_INTERNAL_KEY
        sync: false

      # ── Primary SMTP ────────────────────────────────────────────────────────
      - key: EMAIL_HOST
        value: smtp.gmail.com

      - key: EMAIL_PORT
        value: "587"

      - key: EMAIL_USE_TLS
        value: "True"

      - key: EMAIL_HOST_USER
        sync: false

      - key: EMAIL_HOST_PASSWORD
        sync: false

      - key: DEFAULT_FROM_EMAIL
        sync: false

      # ── Support SMTP ────────────────────────────────────────────────────────
      - key: SUPPORT_EMAIL_HOST
        value: smtp.gmail.com

      - key: SUPPORT_EMAIL_PORT
        value: "587"

      - key: SUPPORT_EMAIL_USE_TLS
        value: "True"

      - key: SUPPORT_EMAIL_USER
        sync: false

      - key: SUPPORT_EMAIL_PASSWORD
        sync: false

      - key: SUPPORT_FROM_EMAIL
        sync: false

      # ── Supabase Storage — media files (images, uploads) ───────────────────
      - key: SUPABASE_S3_URL
        sync: false   # https://<ref>.supabase.co/storage/v1/s3

      - key: SUPABASE_S3_ACCESS_KEY
        sync: false   # Supabase Dashboard → Storage → S3 Access Keys

      - key: SUPABASE_S3_SECRET_KEY
        sync: false

      - key: SUPABASE_BUCKET
        value: knfc-media

      - key: SUPABASE_S3_REGION
        value: ap-southeast-2

      - key: OTP_BYPASS
        value: "False"

      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── WhatsApp Baileys Service (Node.js) ───────────────────────────────────────
  - type: web
    name: knfc-whatsapp
    runtime: node
    plan: free
    region: singapore
    rootDir: whatsapp-service
    buildCommand: "npm install --omit=dev && node patch.mjs"
    startCommand: "node index.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      - key: INTERNAL_KEY
        sync: false   # Same value as WHATSAPP_INTERNAL_KEY in knfc-backend

      # Supabase S3 — session persistence (reuse same bucket as Django media)
      - key: SUPABASE_S3_URL
        fromService:
          type: web
          name: knfc-backend
          envVarKey: SUPABASE_S3_URL

      - key: SUPABASE_S3_ACCESS_KEY
        fromService:
          type: web
          name: knfc-backend
          envVarKey: SUPABASE_S3_ACCESS_KEY

      - key: SUPABASE_S3_SECRET_KEY
        fromService:
          type: web
          name: knfc-backend
          envVarKey: SUPABASE_S3_SECRET_KEY

      - key: SUPABASE_BUCKET
        fromService:
          type: web
          name: knfc-backend
          envVarKey: SUPABASE_BUCKET

      - key: SUPABASE_S3_REGION
        fromService:
          type: web
          name: knfc-backend
          envVarKey: SUPABASE_S3_REGION

      - key: NODE_VERSION
        value: "20.11.0"

