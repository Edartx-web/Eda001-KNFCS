# Render Blueprint — KNFC Backend
# Database: Supabase (external, free forever)
# Redis:    Upstash  (external, free forever)
#
# First deploy:
#   1. Push this file to GitHub
#   2. Render Dashboard → New → Blueprint → connect repo
#   3. Fill in the secret env vars flagged with sync: false
#   4. Click Apply

services:
  # ── Django ASGI Web Service ───────────────────────────────────────────────────
  - type: web
    name: knfc-backend
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    healthCheckPath: /api/v1/branches/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production

      - key: SECRET_KEY
        generateValue: true

      # Supabase PostgreSQL — set manually in Render dashboard
      - key: DATABASE_URL
        sync: false

      # Upstash Redis — set manually in Render dashboard
      - key: REDIS_URL
        sync: false

      - key: DB_SSL_REQUIRE
        value: "True"

      - key: BACKEND_URL
        value: https://knfc-backend.onrender.com

      - key: ALLOWED_HOSTS
        value: knfc-backend.onrender.com,api.knfcs.com,knfcs.com,www.knfcs.com

      - key: CORS_ALLOWED_ORIGINS
        value: https://knfcs.com,https://www.knfcs.com

      - key: FRONTEND_URL
        value: https://knfcs.com

      - key: WHATSAPP_SERVICE_URL
        value: https://wa.knfcs.com

      - key: WHATSAPP_INTERNAL_KEY
        sync: false

      # ── Primary SMTP ────────────────────────────────────────────────────────
      - key: EMAIL_HOST
        value: smtp.gmail.com

      - key: EMAIL_PORT
        value: "587"

      - key: EMAIL_USE_TLS
        value: "True"

      - key: EMAIL_HOST_USER
        sync: false

      - key: EMAIL_HOST_PASSWORD
        sync: false

      - key: DEFAULT_FROM_EMAIL
        sync: false

      # ── Support SMTP ────────────────────────────────────────────────────────
      - key: SUPPORT_EMAIL_HOST
        value: smtp.gmail.com

      - key: SUPPORT_EMAIL_PORT
        value: "587"

      - key: SUPPORT_EMAIL_USE_TLS
        value: "True"

      - key: SUPPORT_EMAIL_USER
        sync: false

      - key: SUPPORT_EMAIL_PASSWORD
        sync: false

      - key: SUPPORT_FROM_EMAIL
        sync: false

      - key: OTP_BYPASS
        value: "False"

      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  - type: worker
    name: knfc-celery
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker -l info --concurrency=2"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production

      - key: SECRET_KEY
        fromService:
          type: web
          name: knfc-backend
          envVarKey: SECRET_KEY

      - key: DATABASE_URL
        fromService:
          type: web
          name: knfc-backend
          envVarKey: DATABASE_URL

      - key: REDIS_URL
        fromService:
          type: web
          name: knfc-backend
          envVarKey: REDIS_URL

      - key: DB_SSL_REQUIRE
        value: "True"

      - key: WHATSAPP_SERVICE_URL
        value: https://wa.knfcs.com

      - key: WHATSAPP_INTERNAL_KEY
        fromService:
          type: web
          name: knfc-backend
          envVarKey: WHATSAPP_INTERNAL_KEY

      - key: EMAIL_HOST
        value: smtp.gmail.com

      - key: EMAIL_PORT
        value: "587"

      - key: EMAIL_USE_TLS
        value: "True"

      - key: EMAIL_HOST_USER
        fromService:
          type: web
          name: knfc-backend
          envVarKey: EMAIL_HOST_USER

      - key: EMAIL_HOST_PASSWORD
        fromService:
          type: web
          name: knfc-backend
          envVarKey: EMAIL_HOST_PASSWORD

      - key: DEFAULT_FROM_EMAIL
        fromService:
          type: web
          name: knfc-backend
          envVarKey: DEFAULT_FROM_EMAIL

      - key: SUPPORT_EMAIL_HOST
        value: smtp.gmail.com

      - key: SUPPORT_EMAIL_PORT
        value: "587"

      - key: SUPPORT_EMAIL_USE_TLS
        value: "True"

      - key: SUPPORT_EMAIL_USER
        fromService:
          type: web
          name: knfc-backend
          envVarKey: SUPPORT_EMAIL_USER

      - key: SUPPORT_EMAIL_PASSWORD
        fromService:
          type: web
          name: knfc-backend
          envVarKey: SUPPORT_EMAIL_PASSWORD

      - key: SUPPORT_FROM_EMAIL
        fromService:
          type: web
          name: knfc-backend
          envVarKey: SUPPORT_FROM_EMAIL

      - key: PYTHON_VERSION
        value: "3.11.0"
