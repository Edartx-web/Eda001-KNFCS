<html lang="en-IN">

    <!-- ── Google Search Console verification ─────────────────────────────  -->

    <!-- <meta name="google-site-verification" content="REPLACE_WITH_YOUR_TOKEN" /> -->

    <!-- ── JSON-LD: Restaurant + LocalBusiness + FAQ structured data ───────  -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": ["Restaurant", "LocalBusiness", "FoodEstablishment"],
          "@id": "https://knfcs.com/#restaurant",
          "name": "KNFC Fried Chicken",
          "alternateName": ["KNFC", "KNFC Chicken", "KNFC Fried Chicken"],
          "description": "India's crispiest fried chicken. Fresh, bold flavours. Order online for delivery, takeaway or dine-in.",
          "url": "https://knfcs.com/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://knfcs.com/android-chrome-512x512.png",
            "width": 512,
            "height": 512
          },
          "image": "https://knfcs.com/og-image.jpg",
          "email": "CustomerSupportKNFC@gmail.com",
          "servesCuisine": ["Fried Chicken", "Fast Food", "American", "Indian Fast Food", "Chicken Burgers", "Snacks"],
          "priceRange": "₹₹",
          "currenciesAccepted": "INR",
          "paymentAccepted": ["Cash", "UPI", "Credit Card", "Debit Card"],
          "hasMenu": "https://knfcs.com/menu",
          "menu": "https://knfcs.com/menu",
          "acceptsReservations": false,
          "openingHoursSpecification": [
            {
              "@type": "OpeningHoursSpecification",
              "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
              "opens": "09:00",
              "closes": "22:00"
            }
          ],
          "sameAs": [],
          "potentialAction": {
            "@type": "OrderAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://knfcs.com/menu",
              "actionPlatform": [
                "https://schema.org/DesktopWebPlatform",
                "https://schema.org/MobileWebPlatform",
                "https://schema.org/IOSPlatform",
                "https://schema.org/AndroidPlatform"
              ]
            },
            "deliveryMethod": ["http://purl.org/goodrelations/v1#DeliveryModePickUp"],
            "result": {
              "@type": "Order",
              "orderStatus": "https://schema.org/OrderDelivered"
            }
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://knfcs.com/#website",
          "url": "https://knfcs.com/",
          "name": "KNFC Fried Chicken",
          "description": "India's crispiest fried chicken — order online",
          "publisher": { "@id": "https://knfcs.com/#restaurant" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://knfcs.com/menu/all?search={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "BreadcrumbList",
          "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "Home",   "item": "https://knfcs.com/" },
            { "@type": "ListItem", "position": 2, "name": "Menu",   "item": "https://knfcs.com/menu" },
            { "@type": "ListItem", "position": 3, "name": "Offers", "item": "https://knfcs.com/offers" }
          ]
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "What is KNFC Fried Chicken?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "KNFC Fried Chicken is India's crispy fried chicken brand. We serve fresh, golden-fried chicken — burgers, combos, snacks, and cold drinks — available for delivery, takeaway, and dine-in."
              }
            },
            {
              "@type": "Question",
              "name": "How do I order from KNFC?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "You can order directly on our website at knfcs.com. Browse the menu, add items to your cart, and place your order online for quick delivery or pickup."
              }
            },
            {
              "@type": "Question",
              "name": "What does KNFC stand for?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "KNFC stands for KNFC Fried Chicken — our brand name. We are a multi-branch fried chicken chain serving fresh, crispy chicken across India."
              }
            },
            {
              "@type": "Question",
              "name": "What items are on the KNFC menu?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "KNFC menu includes crispy fried chicken, chicken burgers, combo meals, snacks, cold drinks, and hot deals. Visit knfcs.com/menu to see all items and current offers."
              }
            },
            {
              "@type": "Question",
              "name": "What are KNFC's opening hours?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "KNFC is open every day from 9:00 AM to 10:00 PM. You can order online anytime on our website at knfcs.com."
              }
            },
            {
              "@type": "Question",
              "name": "Is KNFC better than KFC?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "KNFC Fried Chicken is an Indian fried chicken brand known for its fresh, crispy chicken made with bold Indian flavours. Try it yourself at knfcs.com and taste the difference!"
              }
            }
          ]
        }
      ]
    }
    </script>
  </head>
  <style>
    /* ── Prevent white flash before React CSS loads ── */
    html, body {
      background: #0C0807;
      margin: 0;
      min-height: 100vh;
    }
    /* ── HTML splash — shows before React JS executes ── */
    #knfc-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #0C0807;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.45s ease;
    }
    #knfc-splash.knfc-splash-out {
      opacity: 0;
      pointer-events: none;
    }
    /* Safety: auto-dismiss after 6s even if JS crashes completely */
    #knfc-splash {
      animation: knfc-sp-auto 0.5s ease 6s forwards;
    }
    @keyframes knfc-sp-auto {
      to { opacity: 0; pointer-events: none; visibility: hidden; }
    }
    .knfc-sp-logo {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 2.25rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #fff;
      line-height: 1;
    }
    .knfc-sp-logo span { color: #E8521A; }
    .knfc-sp-sub {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: -12px;
    }
    .knfc-sp-dots {
      display: flex;
      gap: 7px;
    }
    .knfc-sp-dots div {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      animation: knfc-sp-pulse 0.9s ease-in-out infinite;
    }
    .knfc-sp-dots div:nth-child(1) { background: rgba(255,255,255,0.25); animation-delay: 0s; }
    .knfc-sp-dots div:nth-child(2) { background: #E8521A; animation-delay: 0.15s; }
    .knfc-sp-dots div:nth-child(3) { background: #F5C843; animation-delay: 0.3s; }
    .knfc-sp-dots div:nth-child(4) { background: rgba(255,255,255,0.25); animation-delay: 0.45s; }
    @keyframes knfc-sp-pulse {
      0%, 80%, 100% { transform: scale(0.65); opacity: 0.4; }
      40%            { transform: scale(1);    opacity: 1;   }
    }
  </style>

  <body>
    <!-- Splash: visible before React JS executes, dismissed by App on mount -->
    <div id="knfc-splash" aria-hidden="true">
      <div class="knfc-sp-logo">KN<span>FC</span></div>
      <div class="knfc-sp-sub">Fried Chicken</div>
      <div class="knfc-sp-dots">
        <div></div><div></div><div></div><div></div>
      </div>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- root starts invisible; SplashDismisser fades it in when content is ready -->
    <div id="root" style="opacity:0;transition:opacity 0.45s ease;"></div>
  </body>
</html>
