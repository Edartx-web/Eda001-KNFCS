<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{% block subject %}KNFC{% endblock %}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#F1F0EC;font-family:'Helvetica Neue',Arial,sans-serif;color:#120B06;-webkit-font-smoothing:antialiased}
    .wrapper{width:100%;padding:32px 16px}
    .card{max-width:560px;margin:0 auto;background:#FDFCFA;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08)}
    .header{background:linear-gradient(135deg,#E8521A 0%,#C43F0A 100%);padding:32px 40px;text-align:center}
    .brand{font-size:32px;font-weight:900;color:#fff;letter-spacing:-.025em;line-height:1}
    .brand-sub{font-size:10px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:.14em;text-transform:uppercase;margin-top:5px}
    .body{padding:36px 40px}
    .footer{background:#F1F0EC;padding:24px 40px;text-align:center;border-top:1px solid #E8E6E0}
    .footer p{font-size:12px;color:#8C857C;line-height:1.6}
    .btn{display:inline-block;padding:12px 28px;background:#E8521A;color:#fff;font-weight:700;font-size:15px;text-decoration:none;border-radius:10px;margin:4px 0}
    .btn-outline{display:inline-block;padding:11px 26px;background:transparent;color:#E8521A;font-weight:700;font-size:15px;text-decoration:none;border-radius:10px;border:2px solid #E8521A;margin:4px 0}
    .info-box{background:#F9F8F6;border:1px solid #E8E6E0;border-radius:10px;padding:20px 24px;margin:20px 0}
    .info-box.success{background:#F0FDF4;border-color:#BBF7D0;border-left:4px solid #16A34A}
    .info-box.warning{background:#FFFBEB;border-color:#FDE68A;border-left:4px solid #D97706}
    .info-box.brand{background:rgba(232,82,26,.06);border-color:rgba(232,82,26,.2);border-left:4px solid #E8521A}
    .kv-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F0EBE4}
    .kv-row:last-child{border-bottom:none}
    .kv-label{font-size:13px;color:#8C857C;font-weight:600}
    .kv-value{font-size:13px;color:#120B06;font-weight:700;text-align:right}
    .mono{font-family:'Courier New',monospace;font-weight:700;font-size:14px}
    .divider{height:1px;background:#E8E6E0;margin:24px 0}
    h1{font-size:24px;font-weight:800;color:#120B06;letter-spacing:-.02em;margin-bottom:8px;line-height:1.2}
    h2{font-size:18px;font-weight:700;color:#120B06;margin-bottom:12px}
    p{font-size:15px;color:#4A433C;line-height:1.7;margin-bottom:14px}
    p:last-child{margin-bottom:0}
    .small{font-size:13px;color:#8C857C}
    @media(max-width:600px){
      .header,.body,.footer{padding-left:24px;padding-right:24px}
      h1{font-size:20px}
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="card">

    <div class="header">
      <div class="brand">KNFC</div>
      <div class="brand-sub">Fried Chicken</div>
    </div>

    <div class="body">
      {% block body %}{% endblock %}
    </div>

    <div class="footer">
      {% block footer %}
      <p>&copy; {{ year|default:"2026" }} KNFC Fried Chicken. All rights reserved.</p>
      <p style="margin-top:6px">
        <a href="https://knfcs.com/privacy" style="color:#8C857C;text-decoration:none">Privacy</a> &nbsp;·&nbsp;
        <a href="https://knfcs.com/terms"   style="color:#8C857C;text-decoration:none">Terms</a> &nbsp;·&nbsp;
        <a href="https://knfcs.com/contact" style="color:#8C857C;text-decoration:none">Contact</a>
      </p>
      {% endblock %}
    </div>

  </div>
</div>
</body>
</html>
